version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: pulseboard-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pulseboard
    volumes:
      - mongodb_data:/data/db
    networks:
      - pulseboard-network

  backend:
    build:
      context: ./backend
    container_name: pulseboard-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    networks:
      - pulseboard-network

  frontend:
    build:
      context: ./frontend
    container_name: pulseboard-frontend
    restart: always
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pulseboard-network

volumes:
  mongodb_data:

networks:
  pulseboard-network: